# Jekyll Configuration
# https://jekyllrb.com/docs/configuration/

# Site Settings
title: KHORTECH Project Blog
description: Project documentation for KHORTECH Custom, showcasing our work across the motorsport, aviation, UAS, and agriculture industries.
url: https://khortech.com.au
baseurl: ""

# Repository
repository: https://github.com/mgreenhough/KHORTECH_Projects

# Build Settings
markdown: kramdown
highlighter: rouge
future: true
permalink: /:year/:month/:day/:title/
# theme: minima  # Disabled to use custom HTML

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap



# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post

# Exclude files from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
