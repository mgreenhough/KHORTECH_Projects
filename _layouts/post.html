<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | KHORTECH Projects</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
      line-height: 1.6;
    }
    header {
      padding: 1.5rem;
      text-align: center;
      background-color: #1a1a1a;
      color: #fff;
    }
    header a {
      color: #fff;
      text-decoration: none;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      background-color: #fff;
    }
    .post-meta {
      color: #666;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #ddd;
    }
    .post-meta span {
      margin-right: 1rem;
    }
    h1 {
      margin-top: 0;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1rem 0;
      cursor: pointer;
    }
    figure {
      margin: 0;
    }
    figcaption {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    /* Lightbox styles */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      cursor: pointer;
    }
    .lightbox.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      margin: 0;
    }
    .back-link {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1rem;
      background-color: #1a1a1a;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
    .back-link:hover {
      background-color: #333;
    }
    pre {
      background-color: #f4f4f4;
      padding: 1rem;
      overflow-x: auto;
    }
    code {
      background-color: #f4f4f4;
      padding: 0.2rem 0.4rem;
    }
    /* Lightbox styles */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    article img {
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    article img:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="this.classList.remove('active')">
  <img id="lightbox-img" src="" alt="Enlarged view">
</div>

<script>
  // Lightbox functionality - run after DOM is loaded
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('article img').forEach(img => {
      img.addEventListener('click', function() {
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        lightboxImg.src = this.src;
        lightbox.classList.add('active');
      });
    });
  });
</script>

<header>
  <a href="{{ '/' | relative_url }}">← Back to Projects</a>
</header>

<div class="container">
  <article>
    <h1>{{ page.title }}</h1>
    
    <div class="post-meta">
      <span><strong>Date:</strong> {{ page.date | date: "%Y-%m-%d" }}</span>
      {% if page.status %}
      <span><strong>Status:</strong> {{ page.status }}</span>
      {% endif %}
      {% if page.categories %}
      <span><strong>Categories:</strong> {{ page.categories | join: ", " }}</span>
      {% endif %}
    </div>

    {{ content }}

  </article>

  <a href="{{ '/' | relative_url }}" class="back-link">← Back to All Projects</a>
</div>

</body>
</html>
